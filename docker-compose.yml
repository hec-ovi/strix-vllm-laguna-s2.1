services:
  vllm:
    build: ./docker
    image: strix-vllm-laguna-s21
    devices:
      - /dev/kfd
      - /dev/dri
    # numeric host GIDs; the Ubuntu image has no named render/video groups
    group_add:
      - "990"   # render (owns /dev/kfd)
      - "44"    # video (owns /dev/dri)
    ipc: host
    environment:
      # TRITON_ATTN beats the CDNA-tuned ROCM_ATTN default on gfx1151 (measured)
      - VLLM_ATTENTION_BACKEND=${VLLM_ATTENTION_BACKEND:-TRITON_ATTN}
      # gfx1151-tuned fused-MoE configs are opt-in via docker-compose.tuned.yml:
      # the current config is decode-only (M=1) and trades prefill, so it is not
      # a default. Empty here = vLLM's built-in heuristic path.
      - VLLM_TUNED_CONFIG_FOLDER=${VLLM_TUNED_CONFIG_FOLDER:-}
      # AITER FP8/MoE/RMSNorm paths misbehave on gfx1x (established in
      # hec-ovi/vllm-awq4-qwen); default off on this hardware
      - VLLM_ROCM_USE_AITER=${VLLM_ROCM_USE_AITER:-0}
    shm_size: 16g
    security_opt:
      - seccomp=unconfined
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./models:/models
      - ./cache/vllm:/root/.cache/vllm
      - ./cache/triton:/root/.triton
    command: >
      /models/Laguna-S-2.1-INT4
      --host 0.0.0.0 --port 8000
      --trust-remote-code
      --max-model-len 262144
      --enable-auto-tool-choice
      --tool-call-parser poolside_v1
      --reasoning-parser poolside_v1
      --moe-backend triton
