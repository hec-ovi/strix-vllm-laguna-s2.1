services:
  vllm:
    build: ./docker
    image: strix-vllm-laguna-s21
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    ipc: host
    shm_size: 16g
    security_opt:
      - seccomp=unconfined
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./models:/models
    command: >
      /models/Laguna-S-2.1-INT4
      --host 0.0.0.0 --port 8000
      --trust-remote-code
      --max-model-len 262144
      --enable-auto-tool-choice
      --tool-call-parser poolside_v1
      --reasoning-parser poolside_v1
      --moe-backend triton
